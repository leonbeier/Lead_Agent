[variables]
PLAYWRIGHT_BROWSERS_PATH = '0'

[phases.setup]
aptPkgs = [
	'libglib2.0-0',
	'libnss3',
	'libnspr4',
	'libdbus-1-3',
	'libatk1.0-0',
	'libatk-bridge2.0-0',
	'libcups2',
	'libdrm2',
	'libxcb1',
	'libxkbcommon0',
	'libatspi2.0-0',
	'libx11-6',
	'libxcomposite1',
	'libxdamage1',
	'libxext6',
	'libxfixes3',
	'libxrandr2',
	'libgbm1',
	'libpango-1.0-0',
	'libcairo2',
	'libasound2'
]

[phases.install]
cmds = ['npm ci', 'npx playwright install --with-deps chromium']

[phases.build]
cmds = ['npm run build']

[start]
cmd = 'npm run start'
runImage = 'mcr.microsoft.com/playwright:v1.60.0-noble'
